# Trust Gap Taxonomy — named failure modes for agent trust
# Version: 0.1.0
# License: CC BY 4.0
# Each gap maps to: a heuristic (what broke), a trust stage (what was violated),
# and a fix pattern (how to close it).

version: "0.1.0"

gaps:

  # ── Functional family ───────────────────────────────────────────────────
  - id: tg.functional.hallucination
    family: functional
    name: "Hallucination"
    question: "Did the agent produce a confident, well-formed, wrong answer?"
    heuristic_ref: aux.H06
    trust_stage: aux.T01
    severity_default: high
    fix_pattern: "confidence-cues"

  - id: tg.functional.silent_degradation
    family: functional
    name: "Silent Degradation"
    question: "Did quality drop without the agent acknowledging it?"
    heuristic_ref: aux.H10
    trust_stage: aux.T01
    severity_default: high
    fix_pattern: "behavioral-contract"

  - id: tg.functional.inconsistent_output
    family: functional
    name: "Inconsistent Output"
    question: "Did the same input produce meaningfully different outputs?"
    heuristic_ref: aux.H10
    trust_stage: aux.T01
    severity_default: medium
    fix_pattern: "behavioral-contract"

  # ── Contextual family ───────────────────────────────────────────────────
  - id: tg.contextual.memory_amnesia
    family: contextual
    name: "Memory Amnesia"
    question: "Did the agent treat the user as a stranger despite prior context?"
    heuristic_ref: aux.H08
    trust_stage: aux.T02
    severity_default: high
    fix_pattern: "memory-in-motion"

  - id: tg.contextual.preference_ignored
    family: contextual
    name: "Preference Ignored"
    question: "Did the agent ignore an explicitly stated user preference?"
    heuristic_ref: aux.H08
    trust_stage: aux.T02
    severity_default: high
    fix_pattern: "memory-in-motion"

  - id: tg.contextual.context_leak
    family: contextual
    name: "Context Leak"
    question: "Did memory from one scope surface inappropriately in another?"
    heuristic_ref: aux.H08
    trust_stage: aux.T02
    severity_default: high
    fix_pattern: "memory-policy-scoping"

  # ── Judgment family ─────────────────────────────────────────────────────
  - id: tg.judgment.overreach_in_ambiguity
    family: judgment
    name: "Overreach in Ambiguity"
    question: "Did the agent act confidently on an ambiguous instruction?"
    heuristic_ref: aux.H05
    trust_stage: aux.T03
    severity_default: high
    fix_pattern: "intent-handshake"

  - id: tg.judgment.confident_nonsense
    family: judgment
    name: "Confident Nonsense"
    question: "Did the agent commit fully to a wrong reading of the situation?"
    heuristic_ref: aux.H06
    trust_stage: aux.T03
    severity_default: high
    fix_pattern: "confidence-cues"

  - id: tg.judgment.refusal_when_escalation_needed
    family: judgment
    name: "Refusal When Escalation Needed"
    question: "Did the agent refuse instead of escalating to a human?"
    heuristic_ref: aux.H07
    trust_stage: aux.T03
    severity_default: medium
    fix_pattern: "escalation-handoff"

  # ── Advocacy family ─────────────────────────────────────────────────────
  - id: tg.advocacy.metric_over_user
    family: advocacy
    name: "Metric Over User"
    question: "Did the agent optimize for a platform metric over the user's outcome?"
    heuristic_ref: aux.H07
    trust_stage: aux.T04
    severity_default: critical
    fix_pattern: "user-aligned-objective"

  - id: tg.advocacy.incentive_misalignment
    family: advocacy
    name: "Incentive Misalignment"
    question: "Did the agent surface a recommendation shaped by upstream incentives?"
    heuristic_ref: aux.H07
    trust_stage: aux.T04
    severity_default: critical
    fix_pattern: "user-aligned-objective"

  - id: tg.advocacy.loyalty_leak
    family: advocacy
    name: "Loyalty Leak"
    question: "Did the agent reveal or act on information that undermines the user?"
    heuristic_ref: aux.H07
    trust_stage: aux.T04
    severity_default: critical
    fix_pattern: "user-aligned-objective"

severities:
  - id: low
    blocks_ship: false
  - id: medium
    blocks_ship: false
  - id: high
    blocks_ship: true
  - id: critical
    blocks_ship: true
    auto_escalate: true
